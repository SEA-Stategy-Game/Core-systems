name: "Core Systems Work Item"
description: "Create a tracked Core Systems issue (feature/task/bug/UML)"
title: "[Core] "
labels: ["area:core-systems"]
assignees: []
body:
  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      description: Select the primary type of this issue
      options:
        - Feature
        - Task
        - Bug
        - UML / Documentation
        - Spike / Investigation
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - XS
        - S
        - M
        - L
        - XL
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate
      description: "Use one unit only (e.g. story points or hours)"
      placeholder: "e.g. 3 SP or 6h"
    validations:
      required: true

  - type: dropdown
    id: iteration
    attributes:
      label: Iteration
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Backlog (Unscheduled)
    validations:
      required: true

  - type: input
    id: start_date
    attributes:
      label: Start date
      description: "Format: YYYY-MM-DD"
      placeholder: "2026-03-01"
    validations:
      required: false

  - type: input
    id: target_date
    attributes:
      label: Target date
      description: "Format: YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what should be done
      placeholder: "Implement server-side collision resolution for moving units..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: In scope / Out of scope
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Use checklist format
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Unit tests added
        - [ ] Docs/UML updated (if needed)
    validations:
      required: true

  - type: checkboxes
    id: dependencies
    attributes:
      label: Cross-group dependencies
      options:
        - label: AI group dependency
        - label: Multiplayer group dependency
        - label: Graphics group dependency
        - label: No external dependency

  - type: textarea
    id: interface_impact
    attributes:
      label: Interface/contract impact
      description: Mention schema/API/protocol changes
      placeholder: "No contract changes" 
    validations:
      required: true

  - type: checkboxes
    id: uml_needed
    attributes:
      label: UML updates
      options:
        - label: Class diagram update needed
        - label: Sequence diagram update needed
        - label: Use case update needed
        - label: No UML update needed

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical notes
      placeholder: "Algorithm choice, constraints, tradeoffs..."

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      value: |
        - [ ] Code merged to main
        - [ ] Tests pass in CI
        - [ ] Documentation updated
        - [ ] UML updated (if needed)
        - [ ] Stakeholders informed if interfaces changed
    validations:
      required: true
